<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI提示词工作台 | Prompt Workbench</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        .panel {
            padding: 30px;
        }

        .panel-left {
            border-right: 2px solid #f0f0f0;
        }

        .panel-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .templates {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .template-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .template-btn:focus-visible {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        label[for="promptInput"] {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .var-inputs {
            margin-top: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 10px;
        }

        .var-inputs strong {
            display: block;
            margin-bottom: 10px;
        }

        .var-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .var-row span {
            min-width: 80px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #667eea;
        }

        .var-row input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .var-row input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .preview {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            min-height: 300px;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn:focus-visible {
            outline: 3px solid #333;
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .history {
            margin-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: #e0e0e0;
        }

        .history-item:focus-visible {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        .history-item-content {
            flex: 1;
            overflow: hidden;
        }

        .history-delete {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.1em;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .history-delete:hover {
            color: #dc3545;
            background: #fee;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            .panel-left {
                border-right: none;
                border-bottom: 2px solid #f0f0f0;
            }
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI提示词工作台</h1>
            <p>快速生成、测试、优化你的AI提示词</p>
        </div>

        <div class="main">
            <div class="panel panel-left">
                <label for="promptInput">📝 提示词编辑器</label>
                
                <div class="templates" role="group" aria-label="提示词模板">
                    <button class="template-btn" aria-label="加载写作助手模板" onclick="loadTemplate('writing')">📖 写作助手</button>
                    <button class="template-btn" aria-label="加载编程助手模板" onclick="loadTemplate('coding')">💻 编程助手</button>
                    <button class="template-btn" aria-label="加载数据分析模板" onclick="loadTemplate('analysis')">📊 数据分析</button>
                    <button class="template-btn" aria-label="加载翻译专家模板" onclick="loadTemplate('translation')">🌐 翻译专家</button>
                    <button class="template-btn" aria-label="加载创意生成模板" onclick="loadTemplate('creative')">🎨 创意生成</button>
                </div>

                <textarea id="promptInput" placeholder="在这里输入你的提示词...&#10;&#10;支持变量：&#10;{topic} - 主题&#10;{style} - 风格&#10;{length} - 长度&#10;{audience} - 目标受众&#10;&#10;例如：&#10;请帮我写一篇关于{topic}的文章，风格要{style}，字数{length}，面向{audience}。"></textarea>

                <div class="var-inputs">
                    <strong>🔧 变量设置（修改后实时预览）</strong>
                    <div class="var-row">
                        <span>{topic}</span>
                        <input type="text" id="varTopic" value="AI编程" oninput="renderPrompt()" aria-label="topic变量值">
                    </div>
                    <div class="var-row">
                        <span>{style}</span>
                        <input type="text" id="varStyle" value="轻松幽默" oninput="renderPrompt()" aria-label="style变量值">
                    </div>
                    <div class="var-row">
                        <span>{length}</span>
                        <input type="text" id="varLength" value="1000字" oninput="renderPrompt()" aria-label="length变量值">
                    </div>
                    <div class="var-row">
                        <span>{audience}</span>
                        <input type="text" id="varAudience" value="零基础小白" oninput="renderPrompt()" aria-label="audience变量值">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary" aria-label="复制提示词到剪贴板" onclick="copyPrompt()">📋 复制提示词</button>
                    <button class="btn btn-secondary" aria-label="保存到历史记录" onclick="savePrompt()">💾 保存到历史</button>
                    <button class="btn btn-secondary" aria-label="清空编辑器" onclick="clearPrompt()">🗑️ 清空</button>
                </div>

                <div class="history" id="historyPanel">
                    <div class="history-header">
                        <div class="panel-title" style="margin-bottom:0">📚 历史记录</div>
                        <button class="btn-danger btn" style="padding:6px 12px;font-size:0.8em" aria-label="清空所有历史记录" onclick="clearHistory()">清空全部</button>
                    </div>
                    <div id="historyList" role="list" aria-label="历史记录列表"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">👁️ 实时预览</div>
                <div class="preview" id="preview" aria-live="polite">在左侧编辑提示词，这里会实时显示替换变量后的效果...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <script>
        const templates = {
            writing: '你是一位专业的写作助手。\n\n任务：写一篇关于{topic}的文章\n\n要求：\n- 风格：{style}\n- 字数：{length}\n- 目标读者：{audience}\n- 结构清晰，有吸引力的开头和结尾\n- 使用具体案例和数据支撑观点\n\n请开始创作。',
            coding: '你是一位资深的编程专家。\n\n任务：帮我{topic}\n\n要求：\n- 编程语言：{style}\n- 代码风格：简洁、可读性强\n- 包含详细注释\n- 提供使用示例\n- 考虑边界情况和错误处理\n\n请提供完整的代码实现。',
            analysis: '你是一位数据分析专家。\n\n任务：分析{topic}\n\n要求：\n- 分析维度：{style}\n- 报告长度：{length}\n- 目标受众：{audience}\n- 使用图表和可视化建议\n- 提供可执行的洞察和建议\n\n请开始分析。',
            translation: '你是一位专业的翻译专家。\n\n任务：将以下内容翻译成{topic}\n\n要求：\n- 翻译风格：{style}\n- 保持原文的语气和情感\n- 确保专业术语准确\n- 适合{audience}阅读\n\n请开始翻译。',
            creative: '你是一位创意大师。\n\n任务：为{topic}生成创意方案\n\n要求：\n- 创意方向：{style}\n- 方案数量：{length}\n- 目标人群：{audience}\n- 每个方案包含：核心概念、执行步骤、预期效果\n- 创意要新颖、可执行\n\n请开始头脑风暴。'
        };

        let debounceTimer = null;

        function loadTemplate(type) {
            document.getElementById('promptInput').value = templates[type];
            renderPrompt();
        }

        function getVarValues() {
            return {
                topic: document.getElementById('varTopic').value,
                style: document.getElementById('varStyle').value,
                length: document.getElementById('varLength').value,
                audience: document.getElementById('varAudience').value
            };
        }

        function renderPrompt() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function() {
                var input = document.getElementById('promptInput').value;
                var vars = getVarValues();
                var rendered = input
                    .replace(/{topic}/g, vars.topic)
                    .replace(/{style}/g, vars.style)
                    .replace(/{length}/g, vars.length)
                    .replace(/{audience}/g, vars.audience);
                document.getElementById('preview').textContent = rendered;
            }, 150);
        }

        function copyPrompt() {
            var text = document.getElementById('preview').textContent;
            if (!text || text === '在左侧编辑提示词，这里会实时显示替换变量后的效果...') {
                showToast('⚠️ 没有可复制的内容', 'warning');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showToast('✅ 已复制到剪贴板！');
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('✅ 已复制到剪贴板！');
            } catch (e) {
                showToast('⚠️ 复制失败，请手动复制', 'warning');
            }
            document.body.removeChild(ta);
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function savePrompt() {
            var prompt = document.getElementById('promptInput').value;
            if (!prompt.trim()) {
                showToast('⚠️ 提示词不能为空', 'warning');
                return;
            }

            var history = [];
            try {
                history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
            } catch (e) {
                history = [];
            }

            history.unshift({
                content: prompt,
                timestamp: new Date().toLocaleString('zh-CN')
            });

            history = history.slice(0, 20);
            localStorage.setItem('promptHistory', JSON.stringify(history));

            loadHistory();
            showToast('💾 已保存到历史记录');
        }

        function loadHistory() {
            var history = [];
            try {
                history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
            } catch (e) {
                history = [];
            }

            var historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (history.length === 0) {
                var p = document.createElement('p');
                p.style.color = '#999';
                p.textContent = '暂无历史记录';
                historyList.appendChild(p);
                return;
            }

            history.forEach(function(item, index) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.setAttribute('role', 'listitem');
                div.setAttribute('tabindex', '0');

                var contentDiv = document.createElement('div');
                contentDiv.className = 'history-item-content';
                contentDiv.onclick = function() { loadHistoryItem(index); };

                var timeDiv = document.createElement('div');
                timeDiv.style.fontSize = '0.85em';
                timeDiv.style.color = '#999';
                timeDiv.style.marginBottom = '5px';
                timeDiv.textContent = item.timestamp;

                var textDiv = document.createElement('div');
                textDiv.style.overflow = 'hidden';
                textDiv.style.textOverflow = 'ellipsis';
                textDiv.style.whiteSpace = 'nowrap';
                textDiv.textContent = item.content.substring(0, 50) + '...';

                contentDiv.appendChild(timeDiv);
                contentDiv.appendChild(textDiv);

                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'history-delete';
                deleteBtn.setAttribute('aria-label', '删除这条历史记录');
                deleteBtn.textContent = '✕';
                deleteBtn.onclick = function(e) {
                    e.stopPropagation();
                    deleteHistoryItem(index);
                };

                div.appendChild(contentDiv);
                div.appendChild(deleteBtn);
                historyList.appendChild(div);
            });
        }

        function loadHistoryItem(index) {
            var history = [];
            try {
                history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
            } catch (e) { return; }
            if (history[index]) {
                document.getElementById('promptInput').value = history[index].content;
                renderPrompt();
                showToast('📖 已加载历史记录');
            }
        }

        function deleteHistoryItem(index) {
            var history = [];
            try {
                history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
            } catch (e) { return; }
            history.splice(index, 1);
            localStorage.setItem('promptHistory', JSON.stringify(history));
            loadHistory();
            showToast('🗑️ 已删除');
        }

        function clearHistory() {
            localStorage.removeItem('promptHistory');
            loadHistory();
            showToast('🗑️ 历史记录已清空');
        }

        function clearPrompt() {
            document.getElementById('promptInput').value = '';
            document.getElementById('preview').textContent = '在左侧编辑提示词，这里会实时显示替换变量后的效果...';
        }

        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'warning' ? '#ffc107' : '#28a745';
            toast.style.color = type === 'warning' ? '#333' : 'white';
            toast.classList.add('show');

            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        // 实时预览（带防抖）
        document.getElementById('promptInput').addEventListener('input', renderPrompt);

        // 页面加载时加载历史记录
        window.onload = loadHistory;
    </script>
</body>
</html>
